<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI GPT | AI Vocabulary</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260715-vocab-images-ready">
  <script defer src="script.js?v=20260715-vocab-images-ready"></script>
</head>
<body>
  <header class="site-header"></header>
  <main class="page-main">
    <section class="page-hero compact">
      <div>
        <p class="eyebrow">Glossary</p>
        <h1>AI Vocabulary</h1>
        <p>Click a word to explore its meaning, definitions, examples, and image.</p>
      </div>
    </section>

    <section class="section vocab-explorer">
      <div class="vocab-list-heading">
        <p class="eyebrow dark">Activity 4</p>
        <h2>30 Interactive Vocabulary Words</h2>
      </div>

      <label class="search-box vocab-search">
        <span>Search word / Buscar palabra</span>
        <input type="search" id="glossarySearch" placeholder="Type a word in English or Spanish">
      </label>

      <div class="vocab-list" id="glossary" aria-label="Vocabulary word list"></div>

      <div class="vocab-modal" id="vocabModal" aria-hidden="true" hidden>
        <div class="vocab-modal-backdrop" data-close-vocab></div>
        <article class="vocab-modal-panel" role="dialog" aria-modal="true" aria-labelledby="vocabModalTitle">
          <button class="vocab-modal-close" type="button" aria-label="Close vocabulary detail" data-close-vocab>&times;</button>
          <div class="vocab-modal-layout">
            <figure class="vocab-modal-media">
              <figcaption class="vocab-modal-visual-title">
                <span class="vocab-modal-number" id="vocabModalNumber"></span>
                <strong id="vocabModalTitle"></strong>
                <small id="vocabModalSubtitle"></small>
              </figcaption>
              <img id="vocabModalImage" alt="">
            </figure>
            <div class="vocab-modal-content">
              <div class="vocab-modal-grid">
                <section>
                  <span>Meaning / Significado</span>
                  <p id="vocabModalMeaning"></p>
                </section>
                <section>
                  <span>English definition</span>
                  <p id="vocabModalDefinitionEn"></p>
                </section>
                <section>
                  <span>Definicion en espanol</span>
                  <p id="vocabModalDefinitionEs"></p>
                </section>
                <section>
                  <span>English example</span>
                  <p id="vocabModalExampleEn"></p>
                </section>
                <section>
                  <span>Ejemplo en espanol</span>
                  <p id="vocabModalExampleEs"></p>
                </section>
              </div>
            </div>
          </div>
        </article>
      </div>
    </section>
  </main>
  <footer class="site-footer"><p>Vocabulary grows through practice.</p></footer>
</body>
</html>

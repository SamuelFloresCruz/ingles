<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI GPT | Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260720-gallery-linea2-linea3">
  <script defer src="script.js"></script>
</head>
<body>
  <header class="site-header"></header>
  <main class="page-main">
    <section class="gallery-hero">
      <div>
        <p class="eyebrow">Visual Work</p>
        <h1>Gallery</h1>
        <p>Infographics created by our team to explain the evolution and impact of artificial intelligence.</p>
        <div class="gallery-name-list" aria-label="Team members">
          <span>Samuel Flores Cruz</span>
          <span>Rodrigo Heredia Morante</span>
          <span>Michel Daniel Oporto Valencia</span>
        </div>
      </div>
    </section>

    <section class="gallery-presentation">
      <figure class="gallery-feature">
        <img src="assets/images/evolucion.png" alt="Artificial intelligence evolution infographic">
        <figcaption>
          <span>Evolution</span>
          <p>How artificial intelligence has developed through software, data, algorithms, and modern computing power.</p>
        </figcaption>
      </figure>
      <figure class="gallery-feature">
        <img src="assets/images/impacto.png" alt="Artificial intelligence impact infographic">
        <figcaption>
          <span>Impact</span>
          <p>How artificial intelligence affects business, healthcare, education, infrastructure, and daily digital systems.</p>
        </figcaption>
      </figure>
      <figure class="gallery-feature gallery-feature-portrait">
        <h2 class="gallery-feature-title">Infografía</h2>
        <img src="assets/images/infografia.png" alt="Artificial intelligence adoption statistics infographic">
        <figcaption>
          <span>AI Adoption</span>
          <p>Key statistics about artificial intelligence adoption, business challenges, and future investment.</p>
        </figcaption>
      </figure>
      <figure class="gallery-feature gallery-feature-wide">
        <img src="assets/gallery/linea1-1.png" alt="Horizontal artificial intelligence infographic, part 1">
      </figure>
      <figure class="gallery-feature gallery-feature-wide">
        <img src="assets/gallery/linea1-2.png" alt="Horizontal artificial intelligence infographic, part 2">
      </figure>
      <figure class="gallery-feature gallery-feature-tall">
        <img src="assets/gallery/linea2.jpeg" alt="Artificial intelligence infographic, part 3">
      </figure>
      <figure class="gallery-feature gallery-feature-tall">
        <img src="assets/gallery/linea3.jpeg" alt="Artificial intelligence infographic, part 4">
      </figure>
    </section>
  </main>
</body>
</html>
